name: fimms_demo
description: "FIMMS Field Inspection Management & Monitoring System — Demo Build"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Device services
  geolocator: ^13.0.2
  image_picker: ^1.1.2

  # Typography
  google_fonts: ^6.2.1

  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fixtures/
    - assets/images/
